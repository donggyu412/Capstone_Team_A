behaviors:
  ReacherRobot:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 3.0e-4
      batch_size: 1024
      buffer_size: 8192
      num_epoch: 3
    network_settings:
      num_layers: 2
      hidden_units: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 100000
    time_horizon: 64
    checkpoint_interval: 50000
    summary_freq: 5000